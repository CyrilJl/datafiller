name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.11"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.12"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.13"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.12"
            pandas-label: "3.x"
            pandas-spec: ">=3,<4"
          - python-version: "3.13"
            pandas-label: "3.x"
            pandas-spec: ">=3,<4"
    name: Test (Python ${{ matrix.python-version }}, pandas ${{ matrix.pandas-label }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test] "pandas${{ matrix.pandas-spec }}"

      - name: Test with pytest
        run: |
          pytest -vv -s
