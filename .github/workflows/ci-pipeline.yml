name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.11"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.12"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.13"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.14"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.12"
            pandas-label: "3.x"
            pandas-spec: ">=3,<4"
          - python-version: "3.13"
            pandas-label: "3.x"
            pandas-spec: ">=3,<4"
          - python-version: "3.14"
            pandas-label: "3.x"
            pandas-spec: ">=3,<4"
    name: Test (Python ${{ matrix.python-version }}, pandas ${{ matrix.pandas-label }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test] "pandas${{ matrix.pandas-spec }}"

      - name: Test with pytest
        run: |
          pytest -vv -s

  typecheck:
    # ty is pre-1.0: pinned so a ty release cannot break CI without a code
    # change. Package dependencies are installed so imports resolve; torch
    # (CPU), polars, and the test extra (pooch) cover the optional-dependency
    # modules.
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[test,polars]" ty==0.0.61

      - name: Type check
        run: ty check --python "$(which python)" src/datafiller

  coverage:
    # Runs the suite with numba JIT disabled so coverage.py can trace the
    # @njit kernels, with CPU-only torch so the non-CUDA GPU-backend tests
    # run. test_timing.py is skipped: its large workloads are impractically
    # slow without JIT compilation.
    name: Coverage (numba JIT disabled)
    runs-on: ubuntu-latest
    env:
      NUMBA_DISABLE_JIT: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[test,polars]"

      - name: Test with coverage
        run: pytest -q --ignore=tests/test_timing.py --cov=datafiller --cov-report=term-missing --cov-fail-under=85

  # Single aggregate check for branch protection: requiring only "CI success"
  # stays correct when the test matrix changes.
  ci-success:
    name: CI success
    if: always()
    needs: [lint, typecheck, test, coverage, polars]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  polars:
    strategy:
      fail-fast: false
      matrix:
        include:
          - polars-label: "minimum"
            polars-spec: "==1.0.*"
          - polars-label: "latest"
            polars-spec: ">=1.0"
    name: Test Polars (${{ matrix.polars-label }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,polars]" "polars${{ matrix.polars-spec }}"

      - name: Test with pytest
        run: pytest -vv -s
