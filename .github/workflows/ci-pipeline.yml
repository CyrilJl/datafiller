name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            pandas-label: "2.x"
            pandas-spec: ">=2,<3"
          - python-version: "3.12"
            pandas-label: "3.x"
            pandas-spec: ">=3,<4"
    name: Test (Python ${{ matrix.python-version }}, pandas ${{ matrix.pandas-label }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test] "pandas${{ matrix.pandas-spec }}"

      - name: Test with pytest
        run: |
          pytest -vv -s

  format:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run ruff format
        run: ruff format .

      - name: Ruff sort imports
        run: ruff check --select I --fix .

      - name: Commit changes
        if: success()
        run: |
          git diff --quiet || (
            git add . &&
            git -c user.name="GitHub Actions" -c user.email="actions@github.com" commit -m "Format code with Ruff" &&
            git push
          )
